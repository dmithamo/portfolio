<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dennis Mithamo | Software Engineer</title>

    <!-- SEO Essentials -->
    <meta
      name="description"
      content="Software Engineer and former Civil Engineer specializing in resilient digital infrastructure, high-performance BI dashboards, and scalable systems."
    />
    <meta
      name="keywords"
      content="Software Engineer, Civil Engineering, Angular, Go, TypeScript, Nairobi, Kenya, Dennis Mithamo"
    />
    <meta name="author" content="Dennis Mithamo" />

    <meta
      name="theme-color"
      content="#f0eee9"
      media="(prefers-color-scheme: light)"
    />

    <meta
      name="theme-color"
      content="#0a0a0c"
      media="(prefers-color-scheme: dark)"
    />
    <!-- Open Graph (LinkedIn/Twitter previews) -->
    <meta property="og:title" content="Dennis Mithamo | Software Engineer" />
    <meta
      property="og:description"
      content="Trading structural blueprints for code. Building resilient digital infrastructure with an engineering mindset."
    />
    <meta property="og:url" content="https://dmithamo.dev" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://dmithamo.dev/og-image.png" />

    <meta name="color-scheme" content="light dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base href="/" />
    <link rel="icon" type="image/x-icon" href="d-favicon.png" />

    <!-- Preloads remain as they are for performance -->
    <link
      rel="preload"
      href="/fonts/fredoka-latin-600-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="/fonts/fredoka-latin-700-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="/fonts/fredoka-latin-400-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />

    <script>
      (function () {
        const isDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        document.documentElement.style.colorScheme = isDark ? "dark" : "light";
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
