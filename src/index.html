<!doctype html>
<html lang="en">
  <head>
    <meta name="color-scheme" content="light dark" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base href="/" />
    <link rel="icon" type="image/x-icon" href="d-favicon.png" />

    <link
      rel="preload"
      href="/fonts/fredoka-latin-600-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />

    <link
      rel="preload"
      href="/fonts/fredoka-latin-700-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />

    <link
      rel="preload"
      href="/fonts/fredoka-latin-400-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />

    <script>
      (function () {
        const isDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        document.documentElement.style.colorScheme = isDark ? "dark" : "light";
      })();
    </script>

    <title>Dennis Mithamo | Portfolio</title>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
