steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/portfolio-site", "."]

  # Push the image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/portfolio-site"]

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "portfolio-site"
      - "--image"
      - "gcr.io/$PROJECT_ID/portfolio-site"
      - "--region"
      - "us-central1" # Or your preferred region
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
